<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raimundo Santiago Ferrera - Presupuestos y Facturas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <link rel="stylesheet" href="styles/style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/3.0.3/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <script src="scripts/index.mjs"></script>
    <script src="scripts/generatePDF.mjs"></script>
</head>

<body class="bg-dark bg-gradient">
    <div class="bg-danger bg-gradient px-2 justify-content-center">
        <header class="d-flex flex-wrap justify-content-center py-3 mb-4">
            <img class=" mb-3 mb-md-0 me-md-auto" id="imgLogo" src="media/logo.jpeg"
                alt="Logo de la empresa" width="100px" height="100px">
            <h1 class="text-center mb-3 mb-md-0  mx-auto py-4">SANFER REFORMAS -
                PRESUPUESTOS Y FACTURAS</h1>
        </header>
    </div>

    <main>

        <div class="container col-xl-10 col-xxl-8 px-4 py-5  m-md-auto m-auto">
            <div class="row align-items-center g-lg-5 py-5">

                <h3 class="text-center">Rellena el formulario para generar un documento PDF</h3>


                <div class="col-md-10 mx-auto col-lg-8">
                    <form action="" class="p-4 p-lg-8 border border-3 border-danger rounded-3  bg-white">
                        <div class="row g-3">

                            <!--ROWS FORM-->
                            <div class="col-md-8 justify-self-center">
                                <label for="tipoDoc" class="form-label">Selecciona el tipo de Documento</label>
                                <select name="tipoDoc" id="tipoDoc" class="form-select">
                                    <option value="Presupuesto">Presupuesto</option>
                                    <option value="Factura">Factura</option>
                                </select>
                            </div>

                            <div class="col-md-6 justify-self-center">
                                <label for="numFactura" class="form-label">Numero de factura</label>
                                <input type="text" name="numFactura" id="numFactura" placeholder="0000" value="0000"
                                    class="form-control">
                            </div>



                            <div class="col-md-6 align-self-center">
                                <label for="fecha" class="form-label">Fecha</label>
                                <input type="date" name="fecha" id="fecha" class="form-control">
                            </div>

                            <div class="col-md-6 align-self-center">
                                <label for="cliente" class="form-label">Cliente</label>
                                <input type="text" name="cliente" id="cliente" placeholder="Antonio..." value="Antonio"
                                    class="form-control">
                            </div>

                            <div class="col-md-6 align-self-center">
                                <label for="direccion" class="form-label">Dirección</label>
                                <input type="text" name="direccion" id="direccion" placeholder="Avda. El baden, 19..."
                                    value="Avda. El baden, 19" class="form-control">
                            </div>

                            <div class="col-md-8 align-self-center">
                                <label for="localidad" class="form-label">Localidad y Municipio</label>
                                <input type="text" name="localidad" id="localidad"
                                    placeholder="Talavera la real, 06140(Badajoz)..."
                                    value="Talavera la real, 06140(Badajoz)" class="form-control">
                            </div>

                            <div class="col-md-12 align-self-center">
                                <h4>Introduce los conceptos del presupuesto</h4>
                            </div>

                            <div class="col-md-12 align-self-center">
                                <div class="conceptos col-md-12 align-self-center separacionConcepto" id="conceptos">
                                    <!--Inicio Concepto1-->
                                    <div class="col-md-12 border rounded-3 bg-body-secondary separacionConcepto">
                                        <label for="descripcion1" class="form-label">Descripción</label>
                                        <input type="text" name="descripcion1" id="descripcion1" class="form-control">

                                        <label for="cantidad1" class="form-label">Cantidad</label>
                                        <input type="number" name="cantidad1" id="cantidad1" min="1" value="1"
                                            class="form-control">

                                        <label for="precioUnidad1" class="form-label">Precio por unidad</label>
                                        <input type="number" name="precioUnidad1" id="precioUnidad1" min="0" value="0"
                                            class="form-control">
                                    </div>
                                    <!--Fin Concepto 1-->

                                    <button class="btn btn-success" id="btnAnadir">Añadir concepto</button>
                                </div>
                            </div>


                            <button class="btn btn-primary" id="btnEnviar">Generar PDF</button>

                            <!--ACABA ROW FORMS-->

                        </div>
                    </form>
                    <!--Acaba FORM-->
                </div>

            </div>
        </div>
    </main>
</body>

</html>
