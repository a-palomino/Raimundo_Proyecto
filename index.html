<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raimundo Santiago Ferrera - Presupuestos y Facturas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/3.0.3/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <script src="scripts/index.mjs"></script>
    <script src="scripts/generatePDF.mjs"></script>
</head>

<body>
    <main>
        <h1 class="text-center">SANFER REFORMAS - PRESUPUESTOS Y FACTURAS</h1>
        <img class="text-center" id="imgLogo" src="media/logo.jpeg" alt="Logo de la empresa" width="100px" height="100px">

        <div class="mb-3 text-center container-md">
            <h3>Rellena el formulario para generar un documento PDF</h3>

            <form action="">

                <div class="row g-3">

                    <!--ROWS FORM-->
                    <div class="col-md-6 justify-self-center">
                        <label for="tipoDoc" class="form-label">Selecciona el tipo de Documento</label>
                        <select name="tipoDoc" id="tipoDoc" class="form-select">
                            <option value="Presupuesto">Presupuesto</option>
                            <option value="Factura">Factura</option>
                        </select>
                    </div>

                    <div class="col-md-6 justify-self-center">
                        <label for="numFactura">Numero de factura</label>
                        <input type="text" name="numFactura" id="numFactura" placeholder="0000" value="0000">
                    </div>



                    <div class="col-md-6 align-self-center">
                        <label for="fecha">Fecha</label>
                        <input type="date" name="fecha" id="fecha" class="form-date">
                    </div>

                    <div class="col-md-6 align-self-center">
                        <label for="cliente">Cliente</label>
                        <input type="text" name="cliente" id="cliente" placeholder="Antonio..." value="Antonio">
                    </div>

                    <div class="col-md-6 align-self-center">
                        <label for="direccion">Dirección</label>
                        <input type="text" name="direccion" id="direccion" placeholder="Avda. El baden, 19..." value="Avda. El baden, 19">
                    </div>

                    <div class="col-md-6 align-self-center">
                        <label for="localidad">Localidad y Municipio</label>
                        <input type="text" name="localidad" id="localidad"
                            placeholder="Talavera la real, 06140(Badajoz)..." value="Talavera la real, 06140(Badajoz)">
                    </div>

                    <div class="col-md-12 align-self-center">
                        <p>Introduce los conceptos</p>
                    </div>

                    <div class="col-md-12 align-self-center">
                        <div class="conceptos" id="conceptos">
                            <!--Inicio Concepto1-->
                            <div class="mb-3">
                                <label for="descripcion1">Descripción</label>
                                <input type="text" name="descripcion1" id="descripcion1">

                                <label for="cantidad1">Cantidad</label>
                                <input type="number" name="cantidad1" id="cantidad1" min="1" value="1">

                                <label for="precioUnidad1">Precio por unidad</label>
                                <input type="number" name="precioUnidad1" id="precioUnidad1" min="0" value="0">
                            </div>
                            <!--Fin Concepto 1-->


                            <button class="btn btn-success" id="btnAnadir">Añadir concepto</button>
                        </div>
                    </div>


                    <button class="btn btn-primary" id="btnEnviar">Generar PDF</button>

                    <!--ACABA ROW FORMS-->

                </div>



            </form>
        </div>
    </main>
</body>

</html>
